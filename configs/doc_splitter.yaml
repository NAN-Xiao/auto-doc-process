# 文档处理配置：文档拆分为RAG文本块

# ===========================================
# 通用 LLM 配置（图片智能命名、图谱构建等功能共用）
# ===========================================
llm:
  api_key: "sk-6bcfa69eced746968f1f2e7766ee7fcb"   # API Key（请替换为你的真实 Key）
  api_base: "https://api.deepseek.com"             # API 地址
  model: "deepseek-chat"                           # 默认模型

# 向后兼容（即将弃用，请迁移到上方 llm 配置）
deepseek:
  api_key: "sk-6bcfa69eced746968f1f2e7766ee7fcb"
  default_model: "deepseek-chat"

doc_splitter:
  text_splitter:
    chunk_size: 1000      # 文本块大小（字符）
    chunk_overlap: 200    # 块间重叠（字符）
    separators: ["\n\n", "\n", "。", "！", "？", "；", "，", " ", ""]

  image_naming:
    use_llm: true         # 是否使用LLM智能命名（false=简单模式，true=AI模式）
    max_length: 18        # 图片名称最大长度（中文字符数，建议15-20，过长影响显示）
    # LLM 图片命名生成参数（覆盖通用 llm 配置）
    temperature: 0.7      # 生成创造性（0-1，越高越随机）
    max_tokens: 100       # 最大 token 数（控制响应长度）
    frequency_penalty: 0.3  # 频率惩罚（减少重复用词）
    presence_penalty: 0.2   # 存在惩罚（鼓励话题多样性）
    keywords:             # 简单模式关键词（从周围文本中提取）
      - "图"
      - "表"
      - "示意"
      - "流程"
      - "结构"
      - "架构"
      - "模型"
      - "界面"
      - "截图"

  context_extraction:
    max_length: 600               # 单段上下文最大字符
    word_lookback_paragraphs: 8   # Word向前查找段落
    word_lookahead_paragraphs: 5  # Word向后查找段落
    pdf_prev_page_length: 400     # PDF前一页字符数
    pdf_next_page_length: 400     # PDF后一页字符数

  text_deduplication:
    enabled: true
    min_text_length: 10
    min_pattern_length: 3
    repeat_ratio_threshold: 0.6

  output:
    root_dir: "processed"         # 输出根目录
    structure: "nested"           # nested/flat/same
    add_timestamp: true           # 添加时间戳
    verbose: true

  supported_formats: [".pdf", ".docx"]

  processing:
    skip_existing: false          # true=跳过已处理
    continue_on_error: true       # true=出错继续

paths:
  documents_dir: "../../documents"          # 源文档目录（飞书下载位置）
  processed_dir: "../../processed"          # 处理产物目录（chunks/embeddings）
  excel_dir: "../../documents/excel"        # Excel 目录

embedding:
  model: "BAAI/bge-small-zh-v1.5"
  batch_size: 16
  # ONNX 推理线程（多核可适当调大，低配保持 2）
  onnx:
    intra_op_num_threads: 2
    inter_op_num_threads: 2
  huggingface:
    cache_folder: "./models"
    device: "cpu"
    normalize_embeddings: true
