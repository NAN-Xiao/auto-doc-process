# 文档处理配置：文档拆分为RAG文本块

# 通用LLM配置
llm:
  api_key: "sk-6bcfa69eced746968f1f2e7766ee7fcb"
  api_base: "https://api.deepseek.com"
  model: "deepseek-chat"

# 向后兼容（即将弃用）
deepseek:
  api_key: "sk-6bcfa69eced746968f1f2e7766ee7fcb"
  default_model: "deepseek-chat"

doc_splitter:
  text_splitter:
    chunk_size: 1000      # 文本块大小（字符）
    chunk_overlap: 200    # 块间重叠（字符）
    separators: ["\n\n", "\n", "。", "！", "？", "；", "，", " ", ""]

  image_naming:
    use_llm: true         # true=AI命名，false=简单命名
    max_length: 18        # 图片名最大长度
    # 图片命名特有LLM参数（覆盖通用配置）
    temperature: 0.7
    max_tokens: 100
    frequency_penalty: 0.3
    presence_penalty: 0.2

    keywords: ["图", "表", "示意", "流程", "结构", "架构", "模型", "界面", "截图"]

  context_extraction:
    max_length: 600               # 单段上下文最大字符
    word_lookback_paragraphs: 8   # Word向前查找段落
    word_lookahead_paragraphs: 5  # Word向后查找段落
    pdf_prev_page_length: 400     # PDF前一页字符数
    pdf_next_page_length: 400     # PDF后一页字符数

  text_deduplication:
    enabled: true
    min_text_length: 10
    min_pattern_length: 3
    repeat_ratio_threshold: 0.6

  output:
    root_dir: "processed"         # 输出根目录
    structure: "nested"           # nested/flat/same
    add_timestamp: true           # 添加时间戳
    verbose: true

  supported_formats: [".pdf", ".docx"]

  processing:
    skip_existing: false          # true=跳过已处理
    continue_on_error: true       # true=出错继续

paths:
  documents_dir: "../"            # 源文档目录
  processed_subdir: "processed"   # 输出子目录
  excel_dir: "../excel"           # Excel目录

embedding:
  model: "BAAI/bge-small-zh-v1.5"
  batch_size: 16
  huggingface:
    cache_folder: "./models"
    device: "cpu"
    normalize_embeddings: true
