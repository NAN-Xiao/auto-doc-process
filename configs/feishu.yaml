# 飞书文档同步配置

feishu:
  app_id: "cli_a8fb4bd58038d01c"
  app_secret: "B5s9jSpZOjQTEiVGckuc2b0geUJyrGFr"
  base_url: "https://open.feishu.cn"

  output_dir: "../"         # 下载目录（相对路径）

  space_ids: []             # 同步空间ID，空=全部

  log:
    level: "INFO"
    dir: ""

  export:
    poll_max_wait: 300      # 导出最大等待（秒）
    poll_interval: 3        # 轮询间隔（秒）
    poll_initial_delay: 5   # 初始延迟（秒）
    rate_limit_delay: 1     # 导出间隔（秒）

    type_format_map:
      doc: "docx"
      docx: "docx"
      #sheet: "xlsx"
      #bitable: "xlsx"

    skip_types: ["mindnote", "file", "slides", "catalog"]

  vectorize:
    enabled: true

  manifest:
    path: ""                # 增量清单路径，空=默认

  schedule:
    task_name: "TWDDoc"   # Windows 定时任务名称（多实例部署时请改为不同名称）
    run_time: "02:00"       # 定时运行时间
    run_on_start: true      # 启动时运行

  lock:
    path: ""                # 进程锁路径，空=默认
