# LightRAG 知识图谱配置

lightrag:
  working_dir: "../lightrag_workspace"

  llm:
    provider: "deepseek"
    api_base: "https://api.deepseek.com"
    model: "deepseek-chat"
    max_async: 12             # 最大并发请求
    max_token_size: 32768
    timeout: 180

  embedding:
    provider: "local"
    model: "BAAI/bge-small-zh-v1.5"
    dim: 512
    max_token_size: 512
    batch_num: 10

  graph:
    chunk_token_size: 1500
    chunk_overlap_token_size: 200
    entity_extract_max_gleaning: 0    # 实体抽取轮数
    max_graph_nodes: 1000
    max_parallel_insert: 4
    enable_llm_cache: true

  storage:
    kv: "JsonKVStorage"
    vector: "NanoVectorDBStorage"
    graph: "NetworkXStorage"
    doc_status: "JsonDocStatusStorage"

  performance:
    entity_embed_batch: 32
    max_crash_restarts: 5

  pg_export:
    enabled: false
    entity_table: "lightrag_entities"
    relation_table: "lightrag_relations"
    chunk_table: "lightrag_chunks"
    export_entity_embeddings: true
    vector_dim: 512
