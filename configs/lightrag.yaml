# LightRAG 知识图谱配置
# LLM (api_key / api_base / model) 和 embedding.model 统一由 doc_splitter.yaml 提供，
# 此处仅声明图谱特有的覆盖参数；如需单独指定可取消注释。

lightrag:
  # 图谱总开关（false = 跳过阶段4图谱构建）
  enabled: true

  # 工作目录（LightRAG 的缓存和中间数据，放在 processed/ 内）
  working_dir: "../processed/lightrag_workspace"

  llm:
    provider: "openai_compatible"
    # api_base / model / api_key → 继承 doc_splitter.yaml 的 llm 配置
    max_async: 12             # 最大并发请求
    max_token_size: 32768
    timeout: 600

  embedding:
    provider: "local"
    # model → 继承 doc_splitter.yaml 的 embedding.model
    dim: 512
    max_token_size: 512
    batch_num: 10

  graph:
    chunk_token_size: 1500
    chunk_overlap_token_size: 200
    entity_extract_max_gleaning: 0    # 实体抽取轮数
    max_graph_nodes: 1000
    max_parallel_insert: 4
    enable_llm_cache: true

  storage:
    kv: "JsonKVStorage"
    vector: "NanoVectorDBStorage"
    graph: "NetworkXStorage"
    doc_status: "JsonDocStatusStorage"

  # -----------------------------------------
  # 性能调优（低配机器可减小，高配可增大）
  # -----------------------------------------
  performance:
    entity_embed_batch: 32
    max_crash_restarts: 5

  # -----------------------------------------
  # PostgreSQL 图谱导出配置
  # 构建完成后将实体和关系导出到 PG 表（二次备份）
  # 数据库连接复用 db_info.yml
  # -----------------------------------------
  pg_export:
    enabled: false                       # 是否启用 PG 导出（本地文件已足够，doc_chunks 单独入库）
    entity_table: "lightrag_entities"    # 实体表名
    relation_table: "lightrag_relations" # 关系表名
    chunk_table: "lightrag_chunks"       # 文本块表名
    export_entity_embeddings: true
    vector_dim: 512
